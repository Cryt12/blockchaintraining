<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Receipt of Returned Expendable Property System — blockchain-verified property returns." />
    <title>RREPS — Returned Expendable Property</title>
    <script>
      // Apply the saved theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem('rreps-theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
